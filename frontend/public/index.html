<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AutomaWeb - Gerador de Testes Robot Framework</title>
  <link rel="stylesheet" href="/static/frontend/styles.css">
  <link rel="stylesheet" href="/static/frontend/node_modules/toastify-js/src/toastify.css">
</head>

<body>
  <div class="container">
    <header>
      <h1>🤖 AutomaWeb</h1>
      <p>Gerador de Testes Robot Framework com IA</p>
    </header>

    <div class="tabs">
      <button class="tab-btn active" data-tab="projects">Projetos</button>
      <button class="tab-btn" data-tab="generate">Gerar Teste</button>
      <button class="tab-btn" data-tab="tests">Testes Gerados</button>
    </div>

    <!-- Tab: Projetos -->
    <div id="projects-tab" class="tab-content active">
      <div class="section">
        <h2>Criar Projeto</h2>
        <form id="create-project-form">
          <div class="form-group">
            <label for="project-name">Nome do Projeto</label>
            <input type="text" id="project-name" required minlength="2">
          </div>
          <div class="form-group">
            <label for="project-description">Descrição</label>
            <textarea id="project-description" rows="3"></textarea>
          </div>
          <button type="submit" class="btn btn-primary">Criar Projeto</button>
        </form>
      </div>

      <div class="section">
        <h2>Projetos Existentes</h2>
        <div id="projects-list" class="list"></div>
      </div>
    </div>

    <!-- Tab: Gerar Teste -->
    <div id="generate-tab" class="tab-content">
      <div class="section">
        <h2>Gerar Teste Robot Framework</h2>
        <form id="generate-test-form">
          <div class="form-group">
            <label for="test-project">Projeto</label>
            <select id="test-project" required>
              <option value="">Selecione um projeto</option>
            </select>
          </div>
          <div class="form-group">
            <label for="test-prompt">Prompt (o que deseja testar)</label>
            <textarea id="test-prompt" rows="4" required minlength="5"
              placeholder="Ex: Testar login no sistema com usuário válido e inválido"></textarea>
          </div>
          <div class="form-group">
            <label for="test-context">Contexto Adicional (opcional)</label>
            <textarea id="test-context" rows="3"
              placeholder="Ex: URL: https://example.com, Seletores específicos, etc."></textarea>
          </div>
          <button type="submit" class="btn btn-primary">Gerar Teste</button>
        </form>
      </div>

      <div id="generated-result" class="section hidden">
        <h2>Teste Gerado</h2>
        <div class="result-actions">
          <button id="copy-test-btn" class="btn btn-secondary">Copiar Código</button>
          <button id="download-test-btn" class="btn btn-secondary">Download .robot</button>
        </div>
        <pre><code id="test-code"></code></pre>
      </div>
    </div>

    <!-- Tab: Testes Gerados -->
    <div id="tests-tab" class="tab-content">
      <div class="section">
        <h2>Histórico de Testes</h2>
        <div id="tests-list" class="list"></div>
      </div>
    </div>
  </div>

  <script src="/static/frontend/node_modules/axios/dist/axios.min.js"></script>
  <script src="/static/frontend/node_modules/toastify-js/src/toastify.js"></script>
  <script src="/static/frontend/app.js"></script>
</body>

</html>
