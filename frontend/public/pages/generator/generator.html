<div class="section visual-builder-section">
  <h2>Test Builder Visual (Robot Framework)</h2>
  <p class="muted">
    Fluxo orientado por captura visual: inspecione e interaja na interface, capture os elementos e gere o teste
    com apoio de LLM.
  </p>

  <form id="visual-builder-form" class="visual-builder-form">
    <div class="form-group">
      <label for="test-project">Projeto</label>
      <select id="test-project" required>
        <option value="">Selecione um projeto</option>
      </select>
    </div>
    <input id="builder-url" type="hidden" />
    <div class="form-group">
      <label for="builder-prompt">Objetivo do teste (opcional)</label>
      <textarea id="builder-prompt" rows="2"
        placeholder="Ex: validar login e mensagem de erro com credenciais inválidas"></textarea>
    </div>
    <div class="form-group">
      <label for="builder-llm-model">Modelo LLM</label>
      <div class="result-actions">
        <select id="builder-llm-model">
          <option value="">Padrão do servidor</option>
        </select>
        <button id="builder-llm-refresh-models-btn" type="button" class="btn btn-secondary">Atualizar Modelos</button>
      </div>
    </div>
    <div class="form-group">
      <label for="builder-llm-plan">Plan Builder</label>
      <select id="builder-llm-plan">
        <option value="balanced">Balanced</option>
        <option value="strict">Strict / Deterministic</option>
        <option value="exploratory">Exploratory</option>
      </select>
    </div>
    <div class="form-group">
      <label for="builder-llm-temperature">Temperature</label>
      <input id="builder-llm-temperature" type="number" min="0" max="2" step="0.1" value="0.2" />
    </div>
    <div class="form-group">
      <label for="builder-llm-max-tokens">Max Tokens</label>
      <input id="builder-llm-max-tokens" type="number" min="256" max="32768" step="256" value="4096" />
    </div>
    <div class="form-group">
      <label for="builder-llm-system-prompt">System Prompt (opcional)</label>
      <textarea id="builder-llm-system-prompt" rows="3"
        placeholder="Instruções extras para o modelo gerar o teste"></textarea>
    </div>
    <div class="result-actions">
      <button id="builder-start-btn" type="submit" class="btn btn-primary">Iniciar Captura Visual</button>
      <button id="builder-refresh-steps-btn" type="button" class="btn btn-secondary">Atualizar Steps</button>
      <button id="builder-generate-btn" type="button" class="btn btn-secondary">Gerar Código Robot</button>
    </div>
  </form>

  <div id="builder-session-banner" class="scan-cache-notice hidden">
    <span>Sessão ativa: <strong id="builder-session-id">-</strong></span>
  </div>

  <div id="builder-steps-panel" class="generation-parts hidden">
    <p id="builder-steps-summary" class="generation-parts-summary">Nenhum step capturado ainda.</p>
    <ul id="builder-steps-list" class="generation-parts-list"></ul>
  </div>

  <div id="builder-code-panel" class="hidden">
    <div class="result-actions">
      <button id="builder-copy-code-btn" type="button" class="btn btn-secondary">Copiar Código Robot</button>
    </div>
    <pre><code id="builder-code"></code></pre>
  </div>
</div>

<div id="generation-status" class="generation-status hidden" role="status" aria-live="polite">
  <span class="generation-status-spinner" aria-hidden="true"></span>
  <div class="generation-status-body">
    <span id="generation-status-label" class="generation-status-label">Gerando teste...</span>
    <span id="generation-status-detail" class="generation-status-detail"></span>
  </div>
  <span id="generation-status-timer" class="generation-status-timer">0s</span>
</div>

<div id="generated-result" class="section hidden">
  <h2>Teste Gerado</h2>
  <div id="generation-parts" class="generation-parts hidden" aria-live="polite">
    <p id="generation-parts-summary" class="generation-parts-summary"></p>
    <ul id="generation-parts-list" class="generation-parts-list"></ul>
  </div>
  <div class="result-actions">
    <button id="copy-test-btn" class="btn btn-secondary">Copiar Código</button>
    <button id="download-test-btn" class="btn btn-secondary">Download .robot</button>
  </div>
  <pre><code id="test-code"></code></pre>
</div>
