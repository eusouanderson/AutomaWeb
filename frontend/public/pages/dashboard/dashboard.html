<div class="section">
  <h2>Criar Projeto</h2>
  <form id="create-project-form">
    <div class="form-group">
      <label for="project-name">Nome do Projeto</label>
      <input type="text" id="project-name" required minlength="2" />
    </div>
    <div class="form-group">
      <label for="project-description">Descrição</label>
      <textarea id="project-description" rows="3"></textarea>
    </div>
    <div class="form-group">
      <label for="project-url">URL do Projeto</label>
      <input type="url" id="project-url" placeholder="https://exemplo.com" required />
      <small>URL base da aplicação para escaneamento inteligente</small>
    </div>
    <div class="form-group">
      <label for="project-test-dir">Diretório de Testes</label>
      <input type="text" id="project-test-dir" placeholder="/caminho/para/testes" required />
      <small>Caminho onde os testes serão salvos e executados</small>
    </div>
    <button type="submit" class="btn btn-primary">Criar Projeto</button>
  </form>
</div>

<div class="section">
  <h2>Projetos Existentes</h2>
  <div id="projects-list" class="list"></div>
</div>
