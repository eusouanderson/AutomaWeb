<div class="section">
  <h2>Editor Robot Framework</h2>
  <p class="muted">Edite os arquivos de teste do Robot Framework com assistência opcional de IA.</p>

  <div class="form-group">
    <label for="editor-project">Projeto</label>
    <select id="editor-project" required>
      <option value="">Selecione um projeto</option>
    </select>
  </div>

  <div class="form-group">
    <label for="editor-test">Arquivo de teste</label>
    <select id="editor-test" disabled>
      <option value="">Selecione um projeto primeiro</option>
    </select>
  </div>



  <div id="editor-toolbar" class="editor-toolbar hidden">
    <div id="editor-actions-slot"></div>
  </div>

  <div>
    <label> Digite um prompt para a IA</label>
  </div>

  <div id="editor-loading" class="editor-loading hidden" role="status" aria-live="polite">
    <span class="loader-dot" aria-hidden="true"></span>
    <span id="editor-loading-text">Loading…</span>
  </div>

  <div id="editor-wrap" class="editor-wrap hidden">
    <div id="editor-file-info" class="editor-file-info">
      <span id="editor-filename" class="editor-filename"></span>
      <span id="editor-dirty-badge" class="editor-dirty-badge hidden">alterações não salvas</span>
    </div>
    <div id="robot-editor" class="robot-editor" contenteditable="true" spellcheck="false" autocorrect="off"
      autocapitalize="none" aria-label="Editor do Robot Framework" aria-multiline="true" role="textbox"></div>
  </div>

  <div id="editor-status" class="editor-status" aria-live="polite"></div>
</div>
