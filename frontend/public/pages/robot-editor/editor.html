<section class="panel">
  <header class="panel-head">
    <h2>Robot Test Editor</h2>
    <p>Open and edit Robot Framework test files with optional AI assistance.</p>
  </header>

  <div class="form-grid">
    <label>
      Project
      <select id="editor-project" required>
        <option value="">Select project</option>
      </select>
    </label>
    <label>
      Test file
      <select id="editor-test" disabled>
        <option value="">Select a project first</option>
      </select>
    </label>
  </div>

  <div id="editor-toolbar" class="editor-toolbar hidden">
    <div id="editor-actions-slot"></div>
  </div>

  <div id="editor-loading" class="editor-loading hidden" role="status" aria-live="polite">
    <span class="loader-dot" aria-hidden="true"></span>
    <span id="editor-loading-text">Loading…</span>
  </div>

  <div id="editor-wrap" class="editor-wrap hidden">
    <div id="editor-file-info" class="editor-file-info">
      <span id="editor-filename" class="editor-filename"></span>
      <span id="editor-dirty-badge" class="editor-dirty-badge hidden">unsaved changes</span>
    </div>
    <div
      id="robot-editor"
      class="robot-editor"
      contenteditable="true"
      spellcheck="false"
      autocorrect="off"
      autocapitalize="none"
      aria-label="Robot Framework editor"
      aria-multiline="true"
      role="textbox"
    ></div>
  </div>

  <div id="editor-status" class="editor-status" aria-live="polite"></div>
</section>
