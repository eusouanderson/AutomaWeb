<section class="panel">
  <header class="panel-head">
    <h2>Test Generator</h2>
    <p>Create Robot Framework tests from natural language prompts.</p>
  </header>

  <form id="generator-form" class="form-grid">
    <label>
      Project
      <select id="generator-project" required>
        <option value="">Select project</option>
      </select>
    </label>
    <label class="full-row">
      Prompt
      <textarea id="generator-prompt" rows="5" required></textarea>
    </label>
    <label class="full-row">
      Context (optional)
      <textarea id="generator-context" rows="4"></textarea>
    </label>
    <div class="inline-actions full-row" id="generator-actions"></div>
  </form>

  <div id="generated-output" class="code-wrap hidden">
    <header class="inline-actions">
      <h3>Generated Test</h3>
      <div id="generated-output-actions"></div>
    </header>
    <pre><code id="generated-code"></code></pre>
  </div>
</section>
