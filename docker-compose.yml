services:
  automaweb:
    build: .
    container_name: automaweb
    ports:
      - '8888:8888'
    volumes:
      # Montar código para desenvolvimento com hot-reload
      - ./app:/app/app
      - ./frontend:/app/frontend
      - ./dev.py:/app/dev.py
      # Certificados corporativos (opcional)
      - ./certs:/app/certs:ro
      # Persistir dados e relatórios
      - ./app.db:/app/app.db
      - ./app/static/reports:/app/app/static/reports
      - ./app/static/projects:/app/app/static/projects
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY}
      - DATABASE_URL=sqlite+aiosqlite:///./app.db
      - GROQ_MODEL=llama-3.3-70b-versatile
      - GROQ_TIMEOUT_SECONDS=30
      - GROQ_MAX_RETRIES=3
      - GROQ_CA_BUNDLE=${GROQ_CA_BUNDLE:-}
      - GROQ_INSECURE_SKIP_VERIFY=${GROQ_INSECURE_SKIP_VERIFY:-false}
      - CACHE_TTL_SECONDS=300
      - STATIC_DIR=app/static
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test:
        [
          'CMD',
          'python',
          '-c',
          "import urllib.request; urllib.request.urlopen('http://localhost:8888/docs')"
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
